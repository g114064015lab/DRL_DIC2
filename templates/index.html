<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate n x n Square</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Modern font for premium feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Generate n x n Square</h1>
        
        <div class="controls">
            <label for="grid-size">Enter a number between 5 and 9:</label>
            <input type="number" id="grid-size" min="5" max="9" value="5">
            <button id="generate-btn">Generate Square</button>
        </div>

        <div id="grid-section" class="hidden fade-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                <h2 id="grid-title">5 x 5 Square:</h2>
                <button id="solve-btn" class="hidden">Solve RL</button>
            </div>
            <p id="instruction-text">1. Click on a cell to set up the start grid as green.</p>
            
            <div class="grid-wrapper">
                <div id="grid-container" class="grid-container">
                    <!-- Dynamic Grid will be generated here -->
                </div>
            </div>
            
            <div class="status-panel">
                <span class="status-badge start">Start: <span id="start-status">Not Set</span></span>
                <span class="status-badge end">End: <span id="end-status">Not Set</span></span>
                <span class="status-badge obstacle">Obstacles: <span id="obs-status">0 / X</span></span>
            </div>
            
            <div id="results-section" class="hidden fade-in" style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
                <div class="results-container">
                    <div class="result-block">
                        <h3 style="text-align: center; margin-bottom: 1rem;">Value Matrix</h3>
                        <div id="value-grid" class="grid-container"></div>
                    </div>
                    <div class="result-block">
                        <h3 style="text-align: center; margin-bottom: 1rem;">Policy Matrix</h3>
                        <div id="policy-grid" class="grid-container"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
